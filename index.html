<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>McDonald's App Shortcut</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #1e1e24;
            color: #f5f5f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 450px;
            width: 100%;
            background: #2a2a32;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        h1 {
            font-size: 22px;
            margin-bottom: 12px;
            font-weight: 600;
        }
        p {
            font-size: 14px;
            color: #a0a0aa;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        .btn-mcd {
            display: inline-block;
            width: 100%;
            padding: 16px 24px;
            font-size: 16px;
            font-weight: bold;
            color: #231f20;
            background-color: #ffbc0d; /* McDonald's Gold */
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.2s ease, transform 0.1s ease;
            box-shadow: 0 4px 12px rgba(255, 188, 13, 0.2);
        }
        .btn-mcd:hover {
            background-color: #e5a90b;
        }
        .btn-mcd:active {
            transform: scale(0.98);
        }
        .footer-info {
            margin-top: 25px;
            font-size: 11px;
            color: #6e6e73;
        }
        .link-display {
            font-family: monospace;
            background: #1e1e24;
            padding: 6px 10px;
            border-radius: 6px;
            color: #ffbc0d;
            font-size: 11px;
            word-break: break-all;
            margin-top: 8px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>App Shortcut</h1>
        <p>Klicke auf den Button unten, um direkt in das versteckte Debug-Menü der McDonald's App umgeleitet zu werden.</p>
        
        <a href="mcdmobileapp://order/productDetail?Produkt-ID=2325" class="btn-mcd">
            McDonald's Entwickler Einstellungen
        </a>

        <div class="footer-info">
            Ziel-Deep-Link:<br>
            <span class="link-display">mcdmobileapp://order/productDetail?Produkt-ID=2325</span>
        </div>
    </div>

</body>
</html>
